name: Build Release

on:
  push:
    tags: ['v*']

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install pyinstaller pillow pystray

      - run: >
          pyinstaller --onefile --windowed
          --name token-monitor
          --icon token_monitor/assets/icon.ico
          interfaz.py

      - uses: actions/upload-artifact@v4
        with:
          name: token-monitor-windows
          path: dist/token-monitor.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/token-monitor.exe
